name: Daily job sync

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Sync official job sources
        run: python app.py sync
      - name: Commit updated job snapshot
        run: |
          git config user.name "finhire-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add finhire.db
          git diff --cached --quiet || git commit -m "chore: daily job sync"
          git push
